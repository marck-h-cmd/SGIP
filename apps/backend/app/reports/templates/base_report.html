<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reporte SGIP-CAP{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; color: #333; }
        .header { background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header .subtitle { font-size: 14px; opacity: 0.9; }
        .container { padding: 20px; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: bold; color: #1a365d; margin-bottom: 10px; border-bottom: 2px solid #2c5282; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { padding: 8px 12px; text-align: left; border: 1px solid #ddd; }
        th { background: #1a365d; color: white; font-weight: bold; }
        tr:nth-child(even) { background: #f9f9f9; }
        .metric-card { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .metric-value { font-size: 24px; font-weight: bold; color: #2c5282; }
        .metric-label { font-size: 12px; color: #666; margin-top: 5px; }
        .warning { background: #fff5f5; border: 1px solid #fc8181; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .success { background: #f0fff4; border: 1px solid #68d391; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .info { background: #ebf8ff; border: 1px solid #63b3ed; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .footer { text-align: center; padding: 15px; font-size: 10px; color: #666; border-top: 1px solid #ddd; margin-top: 30px; }
        @media print {
            body { font-size: 10px; }
            .header { padding: 15px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{% block report_title %}SGIP-CAP{% endblock %}</h1>
        <div class="subtitle">{% block report_subtitle %}{% endblock %}</div>
    </div>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <div class="footer">
        <p>Sistema de Gestion Inteligente de Perdidas - SGIP-CAP | SEDALIB S.A.A.</p>
        <p>Generado: {{ report.generated_at.strftime("%d/%m/%Y %H:%M") }} | DMA: {{ report.dma_id }}</p>
    </div>
</body>
</html>
